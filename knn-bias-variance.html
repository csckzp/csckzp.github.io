
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1rem 0; }
h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
p.sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 1rem; }
.ctrl-group { display: flex; align-items: center; gap: 8px; }
label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
.k-val { font-size: 15px; font-weight: 500; color: var(--color-text-primary); min-width: 28px; }
input[type=range] { width: 200px; }
.gen-row { display: flex; gap: 8px; align-items: center; }
input[type=number] { width: 64px; }
canvas { display: block; width: 100%; max-width: 680px; margin: 0 auto; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 1rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.metric .mlabel { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric .mval { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.metric .mval.good { color: var(--color-text-success); }
.metric .mval.bad { color: var(--color-text-danger); }
.legend { display: flex; gap: 16px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-secondary); }
.legend-sq { width: 12px; height: 12px; border-radius: 2px; }
.note { font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; line-height: 1.5; }
</style>

<div id="app">
  <h2 style="font-size:18px;font-weight:500;margin-bottom:4px;">KNN classifier — bias &amp; variance</h2>
  <p class="sub">Adjust k to see how model complexity affects overfitting and underfitting.</p>

  <div class="controls">
    <div class="ctrl-group">
      <label for="kslider">k =</label>
      <input type="range" id="kslider" min="1" max="60" step="1" value="5">
      <span class="k-val" id="kval">5</span>
    </div>
    <div class="ctrl-group gen-row">
      <label for="nseed">Seed</label>
      <input type="number" id="nseed" value="42" min="1" max="9999">
      <button id="genbtn">Regenerate data</button>
    </div>
  </div>

  <canvas id="cvs" width="680" height="420"></canvas>

  <div style="display:flex;justify-content:space-between;align-items:flex-end;">
    <div class="legend">
      <div class="legend-item"><div class="legend-sq" style="background:#4a90d9;"></div>Class 0 (train)</div>
      <div class="legend-item"><div class="legend-sq" style="background:#e8924a;"></div>Class 1 (train)</div>
    </div>
    <p style="font-size:11px;color:var(--color-text-secondary);">Test instances hidden from view</p>
  </div>

  <div class="metrics">
    <div class="metric"><div class="mlabel">Train accuracy</div><div class="mval" id="m-trainacc">—</div></div>
    <div class="metric"><div class="mlabel">Train error</div><div class="mval" id="m-trainerr">—</div></div>
    <div class="metric"><div class="mlabel">Test accuracy</div><div class="mval" id="m-testacc">—</div></div>
    <div class="metric"><div class="mlabel">Test error</div><div class="mval" id="m-testerr">—</div></div>
  </div>
  <p class="note" id="complexnote"></p>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const W = 680, H = 420;
cvs.width = W; cvs.height = H;

const PAD = 44;
const xMin = -2.5, xMax = 3.2, yMin = -2.5, yMax = 2.8;

function toCanvas(x, y) {
  return [
    PAD + (x - xMin) / (xMax - xMin) * (W - 2*PAD),
    H - PAD - (y - yMin) / (yMax - yMin) * (H - 2*PAD)
  ];
}

function seededRng(seed) {
  let s = seed % 2147483647;
  if (s <= 0) s += 2147483646;
  return function() {
    s = s * 16807 % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function randNorm(rng) {
  const u = 1 - rng(), v = rng();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function makeCrescents(seed, n) {
  const rng = seededRng(seed);
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = rng() * Math.PI;
    const r = 1.0 + randNorm(rng) * 0.18;
    const x = r * Math.cos(t);
    const y = r * Math.sin(t)-0.45;
    pts.push([x, y, 0]);
  }
  for (let i = 0; i < n; i++) {
    const t = rng() * Math.PI + Math.PI * 0.05;
    const r = 1.0 + randNorm(rng) * 0.18;
    const x = r * Math.cos(t) + 0.5;
    const y = -r * Math.sin(t);
    pts.push([x, y, 1]);
  }
  return pts;
}

function knnPredict(train, x, y, k) {
  const dists = train.map(p => ({
    d: (p[0]-x)**2 + (p[1]-y)**2,
    label: p[2]
  }));
  dists.sort((a,b) => a.d - b.d);
  const top = dists.slice(0, k);
  const votes = [0, 0];
  top.forEach(p => votes[p.label]++);
  return votes[1] > votes[0] ? 1 : 0;
}

function accuracy(data, k, train) {
  let correct = 0;
  data.forEach(p => {
    if (knnPredict(train, p[0], p[1], k) === p[2]) correct++;
  });
  return correct / data.length;
}

const GRID = 55;
let trainData = [], testData = [];

function genData(seed) {
  const all = makeCrescents(seed, 75);
  const rng2 = seededRng(seed + 1);
  trainData = [];
  testData = [];
  all.forEach(p => {
    if (rng2() < 0.7) trainData.push(p);
    else testData.push(p);
  });
  const extra = makeCrescents(seed + 999, 25);
  extra.forEach(p => testData.push(p));
}

function drawGrid(k) {
  const imgd = ctx.createImageData(W, H);
  const data = imgd.data;

  for (let py = 0; py < H; py += 2) {
    for (let px = 0; px < W; px += 2) {
      const gx = xMin + (px - PAD) / (W - 2*PAD) * (xMax - xMin);
      const gy = yMin + (H - py - PAD) / (H - 2*PAD) * (yMax - yMin);
      if (gx < xMin || gx > xMax || gy < yMin || gy > yMax) continue;
      const label = knnPredict(trainData, gx, gy, k);
      const r = label === 0 ? 160 : 232;
      const g = label === 0 ? 200 : 180;
      const b = label === 0 ? 230 : 140;
      for (let dy = 0; dy < 2; dy++) {
        for (let dx = 0; dx < 2; dx++) {
          const idx = ((py+dy) * W + (px+dx)) * 4;
          data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imgd, 0, 0);
}

function drawAxes() {
  ctx.strokeStyle = 'rgba(100,100,100,0.35)';
  ctx.lineWidth = 0.5;
  ctx.fillStyle = 'rgba(100,100,100,0.7)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';

  const xTicks = [-2,-1,0,1,2,3];
  xTicks.forEach(v => {
    const [cx] = toCanvas(v, 0);
    ctx.beginPath();
    ctx.moveTo(cx, PAD);
    ctx.lineTo(cx, H - PAD);
    ctx.stroke();
    ctx.fillText(v, cx, H - PAD + 14);
  });

  const yTicks = [-2,-1,0,1,2];
  ctx.textAlign = 'right';
  yTicks.forEach(v => {
    const [,cy] = toCanvas(0, v);
    ctx.beginPath();
    ctx.moveTo(PAD, cy);
    ctx.lineTo(W - PAD, cy);
    ctx.stroke();
    ctx.fillText(v, PAD - 5, cy + 4);
  });

  ctx.fillStyle = 'rgba(80,80,80,0.9)';
  ctx.textAlign = 'center';
  ctx.fillText('X', W/2, H - 6);
  ctx.save();
  ctx.translate(12, H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Y', 0, 0);
  ctx.restore();
}

function drawPoints() {
  trainData.forEach(p => {
    const [cx, cy] = toCanvas(p[0], p[1]);
    if (p[2] === 0) {
      ctx.fillStyle = '#2563c4';
      ctx.strokeStyle = '#1a4a9e';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.rect(cx - 5, cy - 5, 10, 10);
      ctx.fill();
      ctx.stroke();
    } else {
      ctx.fillStyle = '#d4722a';
      ctx.strokeStyle = '#a8561a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx, cy - 6);
      ctx.lineTo(cx + 6, cy + 5);
      ctx.lineTo(cx - 6, cy + 5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
  });
}

function updateMetrics(k) {
  const trainAcc = accuracy(trainData, k, trainData);
  const testAcc = accuracy(testData, k, trainData);
  const trainErr = 1 - trainAcc;
  const testErr = 1 - testAcc;

  document.getElementById('m-trainacc').textContent = (trainAcc * 100).toFixed(1) + '%';
  document.getElementById('m-trainerr').textContent = (trainErr * 100).toFixed(1) + '%';
  document.getElementById('m-testacc').textContent = (testAcc * 100).toFixed(1) + '%';
  document.getElementById('m-testerr').textContent = (testErr * 100).toFixed(1) + '%';

  const te = document.getElementById('m-testerr');
  te.className = 'mval' + (testErr < 0.15 ? ' good' : testErr > 0.30 ? ' bad' : '');

  let note = '';
  if (k === 1) note = 'k=1: maximum complexity — memorizes every training point (zero train error), but likely overfits on unseen data.';
  else if (k <= 5) note = 'Small k: high variance, low bias — the boundary wiggles to fit local noise.';
  else if (k <= 20) note = 'Moderate k: good balance between variance and bias for most datasets.';
  else if (k <= 40) note = 'Large k: increasing bias — boundary becomes smoother and more linear.';
  else note = 'Very large k: high bias, low variance — near-linear boundary, underfitting the true crescent boundary.';
  document.getElementById('complexnote').textContent = note;
}

function render(k) {
  ctx.clearRect(0, 0, W, H);
  drawGrid(k);
  drawAxes();
  drawPoints();
  updateMetrics(k);
}

let currentK = 5;
let currentSeed = 42;

genData(currentSeed);
render(currentK);

const slider = document.getElementById('kslider');
const kval = document.getElementById('kval');

slider.addEventListener('input', () => {
  currentK = parseInt(slider.value);
  kval.textContent = currentK;
  render(currentK);
});

document.getElementById('genbtn').addEventListener('click', () => {
  const sv = parseInt(document.getElementById('nseed').value) || 42;
  currentSeed = sv;
  genData(currentSeed);
  render(currentK);
});
</script>
